<nav class="navbar navbar-expand-lg app-nav" *ngIf="auth.isAuthenticated()">
  <div class="container-fluid">
    <a class="navbar-brand app-brand" routerLink="/" aria-label="Gran Bingo URP">
      <span>Gran</span>
      <strong>Bingo</strong>
      <em>URP</em>
    </a>
    <div class="navbar-nav me-auto">
      <ng-container *ngIf="auth.role() === 'ADMIN'">
        <a class="nav-link" routerLink="/admin/dashboard">Dashboard</a>
        <a class="nav-link" routerLink="/admin/cartones">Cartones</a>
      </ng-container>
      <ng-container *ngIf="auth.role() === 'VENDEDOR'">
        <a class="nav-link" routerLink="/representante/dashboard">Dashboard</a>
        <a class="nav-link" routerLink="/representante/generar">Generar</a>
        <a class="nav-link" routerLink="/representante/historial">Historial</a>
      </ng-container>
    </div>
    <div class="d-flex align-items-center gap-3">
      <span class="small text-white-50">{{ auth.session()?.fullName }}</span>
      <button class="icon-btn" type="button" title="Cambiar contraseña" (click)="openPasswordModal()" aria-label="Cambiar contraseña">
        &#9881;
      </button>
      <button class="btn btn-sm btn-outline-light" type="button" (click)="auth.logout()">Salir</button>
    </div>
  </div>
</nav>

<div class="modal-backdrop-custom" *ngIf="passwordModalOpen">
  <div class="modal-card">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h2 class="h5 mb-0">Cambiar contraseña</h2>
      <button class="btn-close" type="button" (click)="closePasswordModal()" aria-label="Cerrar"></button>
    </div>
    <form (ngSubmit)="changePassword()">
      <div class="mb-3">
        <label class="form-label">Contraseña actual</label>
        <input class="form-control" name="currentPassword" [(ngModel)]="currentPassword" type="password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Nueva contraseña</label>
        <input class="form-control" name="newPassword" [(ngModel)]="newPassword" type="password" required minlength="8">
      </div>
      <div class="mb-3">
        <label class="form-label">Confirmar nueva contraseña</label>
        <input class="form-control" name="confirmPassword" [(ngModel)]="confirmPassword" type="password" required>
      </div>
      <div class="alert alert-danger" *ngIf="passwordError">{{ passwordError }}</div>
      <div class="alert alert-success" *ngIf="passwordMessage">{{ passwordMessage }}</div>
      <div class="d-flex justify-content-end gap-2">
        <button class="btn btn-outline-secondary" type="button" (click)="closePasswordModal()">Cerrar</button>
        <button class="btn btn-primary" type="submit" [disabled]="passwordLoading">
          {{ passwordLoading ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>

<main class="app-shell">
  <router-outlet></router-outlet>
</main>
