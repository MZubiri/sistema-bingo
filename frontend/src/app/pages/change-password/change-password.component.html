<section class="page">
  <h1 class="h3 mb-4">Cambiar contraseña</h1>
  <div class="panel">
    <form (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Contraseña actual</label>
        <input class="form-control" name="currentPassword" [(ngModel)]="currentPassword" type="password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Nueva contraseña</label>
        <input class="form-control" name="newPassword" [(ngModel)]="newPassword" type="password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirmar nueva contraseña</label>
        <input class="form-control" name="confirmPassword" [(ngModel)]="confirmPassword" type="password" required>
      </div>
      <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
      <div class="alert alert-success" *ngIf="message">{{ message }}</div>
      <button class="btn btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Guardando...' : 'Guardar' }}
      </button>
    </form>
  </div>
</section>
