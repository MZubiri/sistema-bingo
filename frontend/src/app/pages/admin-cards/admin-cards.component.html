<section class="page">
  <h1 class="h3 mb-4">Cartones</h1>
  <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
  <form class="panel filter-panel mb-3" (ngSubmit)="load()">
    <div class="filter-grid">
      <div>
        <label class="form-label">Buscar</label>
        <input class="form-control" name="search" [(ngModel)]="search" placeholder="Serial, comprador o representante">
      </div>
      <div>
        <label class="form-label">Agrupacion</label>
        <select class="form-select" name="organizationCode" [(ngModel)]="organizationCode">
          <option value="">Todas</option>
          <option *ngFor="let org of organizationOptions" [value]="org">{{ org }}</option>
        </select>
      </div>
      <div>
        <label class="form-label">Estado</label>
        <select class="form-select" name="status" [(ngModel)]="status">
          <option value="">Todos</option>
          <option *ngFor="let item of statusOptions" [value]="item">{{ item }}</option>
        </select>
      </div>
      <div>
        <label class="form-label">Desde</label>
        <input class="form-control" name="assignedFrom" [(ngModel)]="assignedFrom" type="date">
      </div>
      <div>
        <label class="form-label">Hasta</label>
        <input class="form-control" name="assignedTo" [(ngModel)]="assignedTo" type="date">
      </div>
      <div class="filter-actions">
        <button class="btn btn-primary" type="submit">Filtrar</button>
        <button class="btn btn-outline-secondary" type="button" (click)="clearFilters()">Limpiar</button>
      </div>
    </div>
    <p class="filter-count mb-0">{{ cards.length }} resultado{{ cards.length === 1 ? '' : 's' }}</p>
  </form>
  <div class="panel table-responsive mobile-card-panel">
    <table class="table table-sm table-hover align-middle mobile-card-table">
      <thead>
        <tr>
          <th>Serial</th><th>Agrupacion</th><th>Estado</th><th>Comprador</th><th>Representante</th><th>Fecha</th><th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let card of cards">
          <td class="fw-bold" data-label="Serial">{{ card.serial }}</td>
          <td data-label="Agrupacion">{{ card.organizationCode }}</td>
          <td data-label="Estado"><span class="badge" [ngClass]="badgeClass(card.status)">{{ card.status }}</span></td>
          <td data-label="Comprador">{{ card.buyerName || '-' }}</td>
          <td data-label="Representante">{{ card.sellerName || '-' }}</td>
          <td data-label="Fecha">{{ card.assignedAt | date:'short' }}</td>
          <td class="actions-cell" data-label="Acciones">
            <button class="btn btn-sm btn-outline-danger" type="button" *ngIf="card.status === 'ASSIGNED'" (click)="cancel(card)">
              Cancelar
            </button>
            <span class="text-muted" *ngIf="card.status !== 'ASSIGNED'">-</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
