<section class="login-page">
  <div class="login-card">
    <div class="login-brand" aria-label="Gran Bingo URP">
      <span>Gran</span>
      <strong>Bingo</strong>
      <em>URP</em>
    </div>
    <p class="text-muted mb-4">Gestion de cartones seriados</p>
    <form (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input class="form-control" name="username" [(ngModel)]="username" required autocomplete="username">
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input class="form-control" name="password" [(ngModel)]="password" type="password" required autocomplete="current-password">
      </div>
      <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
      <button class="btn btn-primary w-100" type="submit" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</section>
