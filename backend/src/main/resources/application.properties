spring.application.name=bingo-backend
debug=false
logging.level.root=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.web=INFO

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bingo_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:bingo}
spring.datasource.password=${DB_PASSWORD:bingo123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:change-this-secret-in-production-change-this-secret}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}
app.frontend-url=${FRONTEND_URL:http://localhost:4200}
app.public-url=${PUBLIC_URL:http://localhost:8080}
